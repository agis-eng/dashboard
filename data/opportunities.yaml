ideas:
  - id: partner-pulse
    title: Partner pulse outreach
    stage: ready
    owner: Erik
    summary: Reach out to every active partner with a short questionnaire to map what they are building, where they need help, and what referral economics exist.
    nextStep: Finalize outreach copy and send first wave.
    tags: [Outreach, Partnerships, Referral]
  - id: referral-map
    title: Referral inventory + economics map
    stage: in-progress
    owner: Atlas
    summary: Build a single view of every partner/project that can receive or send referrals, including one-time commissions, recurring rev share, and lead handoff rules.
    nextStep: Fill in missing referral and commission details partner-by-partner.
    tags: [Revenue, Referral, Ops]
  - id: partner-lead-systems
    title: Partner lead-gen systems
    stage: idea
    owner: Erik
    summary: Design repeatable lead systems for selected partners using SEO, paid traffic, outbound, funnels, AI follow-up, and appointment booking.
