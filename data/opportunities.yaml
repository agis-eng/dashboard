    tags: [Lead Gen, Systems, Growth]

questionnaire:
  title: Partner growth questionnaire
  intro: Short questionnaire to understand what each partner is building now, where AGIS can help, and what referral/revenue opportunities exist.
  questions:
    - What are you actively building or launching over the next 90 days?
    - Which offers or services are most important for revenue right now?
    - What type of customers are you trying to reach?
    - What are your current lead sources, and which ones are working best?
    - Where are you currently stuck: leads, conversion, fulfillment, automation, content, or operations?
    - If AGIS could help in one area immediately, what would create the fastest ROI?
    - Do you have a referral, rev-share, or commission structure for introductions we send?
    - If yes, how is it structured: flat fee, percentage, recurring revenue share, or custom?
    - What is the average deal size or customer value for the referrals we would send?
    - How quickly can your team handle new inbound demand if we turn on marketing?
    - Are there any assets already available: landing pages, offers, CRM, email sequences, ad account, case studies?
    - What would make this partnership an obvious win for both sides?

outreach:
  campaignName: Partner pulse spring 2026
  subject: Quick partner check-in — what are you pushing right now?
  preheader: We’re mapping who we can help most aggressively and where referral and lead-gen systems make sense.
  emailBody: |
    Hey {{name}},

    We’re doing a quick partner pulse check across the network to understand what everyone is actively building right now and where we can create the most leverage.

    We want to know:
    - what you’re focused on in the next 30–90 days
    - where AGIS / Atlas could help operationally or with growth
    - whether there’s a referral or rev-share path we should document
    - whether it makes sense for us to build lead systems for you

    If you’re up for it, just reply back with short answers to the questions below, or we can jump on a quick call.

    Questions:
    {{questions_block}}

    We’re trying to identify the fastest-win opportunities where we can help partners grow and also create clean mutual referral channels.

    — Erik

