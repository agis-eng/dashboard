<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Password — Atlas Client Portal</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .login-card h1 {
      font-size: 1.25rem;
      margin: 0 0 0.25rem;
    }
    .login-card .muted {
      margin: 0 0 2rem;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .login-field label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .login-field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.75rem;
      color: var(--text);
      font-size: 0.95rem;
      width: 100%;
      box-sizing: border-box;
    }
    .login-field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      font-size: 1rem;
    }
    .login-error {
      color: #f87171;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }
    .login-error.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Create your password</h1>
      <p class="muted">Choose a new password to continue to your portal.</p>
      <form id="password-form" onsubmit="handlePasswordChange(event)">
        <div class="login-field">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" name="new-password" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="login-field">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm-password" required minlength="8" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn login-btn" id="password-btn">Save password</button>
        <p class="login-error" id="password-error">Passwords must match and be at least 8 characters.</p>
      </form>
    </div>
  </div>
  <script>
    var token = localStorage.getItem('atlas_token');
    var slug = localStorage.getItem('atlas_client_slug');
    if (!token) {
      window.location.href = './login.html';
    } else {
      fetch('/api/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.valid) {
            localStorage.removeItem('atlas_token');
            localStorage.removeItem('atlas_client_slug');
            window.location.href = './login.html';
            return;
          }
          if (!data.mustChangePassword) {
            window.location.href = './clients/' + data.clientSlug + '.html';
          }
        })
        .catch(function() {
          window.location.href = './login.html';
        });
    }

    function handlePasswordChange(e) {
      e.preventDefault();
      var btn = document.getElementById('password-btn');
      var errEl = document.getElementById('password-error');
      var newPassword = document.getElementById('new-password').value;
      var confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword || newPassword.length < 8) {
        errEl.textContent = 'Passwords must match and be at least 8 characters long.';
        errEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';
      errEl.classList.remove('visible');

      fetch('/api/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, newPassword: newPassword })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.token) {
            localStorage.setItem('atlas_token', data.token);
            localStorage.setItem('atlas_client_slug', data.clientSlug);
            window.location.href = './clients/' + data.clientSlug + '.html';
          } else {
            errEl.textContent = data.error || 'Unable to update password. Please try again.';
            errEl.classList.add('visible');
            btn.disabled = false;
            btn.textContent = 'Save password';
          }
        })
        .catch(function() {
          errEl.textContent = 'Unable to update password. Please try again.';
          errEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Save password';
        });
    }
  </script>
</body>
</html>
