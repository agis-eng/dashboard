    function open_client(slug, token) {
      localStorage.setItem('atlas_token', token);
      localStorage.setItem('atlas_client_slug', slug);
      window.open(BASE + slug + '.html', '_blank');
      const t = document.getElementById('toast');
      t.textContent = 'Opening ' + slug + '…';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function render(list) {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      grid.innerHTML = '';
      if (!list.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(c => {
        const card = document.createElement('button');
        card.className = 'card';
        card.innerHTML = '<h3>' + c.name + '</h3><span>' + c.slug + '</span>';
        card.onclick = () => open_client(c.slug, c.token);
        grid.appendChild(card);
      });
    }

    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      render(q ? clients.filter(c => c.name.toLowerCase().includes(q) || c.slug.includes(q)) : clients);
    });

    render(clients);
  </script>
